<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra HD Photo Enhancer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: 4px;
    background: linear-gradient(135deg, #fff 30%, #aaa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 0.78rem;
    color: #555;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .workspace {
    display: flex;
    gap: 24px;
    width: 100%;
    max-width: 1100px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  .canvas-area {
    flex: 1;
    min-width: 280px;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .canvas-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #444;
    text-align: center;
  }

  canvas {
    width: 100%;
    border-radius: 8px;
    display: block;
    background: #111;
    border: 1px solid #1e1e1e;
  }

  .panel {
    width: 280px;
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 12px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .panel-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.1rem;
    letter-spacing: 3px;
    color: #888;
  }

  .control {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .control label {
    font-size: 0.75rem;
    letter-spacing: 1px;
    color: #aaa;
    text-transform: uppercase;
  }

  .val {
    font-size: 0.72rem;
    color: #666;
    font-variant-numeric: tabular-nums;
    min-width: 32px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: #222;
    border-radius: 2px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,255,255,0.2);
  }

  input[type=range]::-webkit-slider-runnable-track {
    background: linear-gradient(to right, #fff var(--pct, 50%), #222 var(--pct, 50%));
    height: 2px;
    border-radius: 2px;
  }

  .btn {
    padding: 13px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Bebas Neue', cursive;
    letter-spacing: 3px;
    font-size: 1rem;
    transition: all 0.2s;
  }

  .btn-primary {
    background: #fff;
    color: #000;
  }
  .btn-primary:hover { background: #e0e0e0; transform: translateY(-1px); }

  .btn-secondary {
    background: transparent;
    color: #aaa;
    border: 1px solid #2a2a2a;
  }
  .btn-secondary:hover { border-color: #555; color: #fff; }

  .btn-download {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: #7ec8e3;
    border: 1px solid #7ec8e3;
  }
  .btn-download:hover { background: #7ec8e3; color: #000; }

  .processing {
    text-align: center;
    font-size: 0.75rem;
    color: #333;
    letter-spacing: 2px;
    text-transform: uppercase;
    min-height: 18px;
  }

  .processing.active { color: #7ec8e3; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .divider {
    height: 1px;
    background: #1e1e1e;
  }

  .preset-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .preset-btn {
    flex: 1;
    min-width: 60px;
    padding: 7px 4px;
    background: #181818;
    border: 1px solid #252525;
    border-radius: 6px;
    color: #888;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .preset-btn:hover, .preset-btn.active {
    border-color: #fff;
    color: #fff;
    background: #1f1f1f;
  }

  #upload-area {
    border: 2px dashed #252525;
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    color: #444;
    font-size: 0.8rem;
    letter-spacing: 1px;
  }
  #upload-area:hover { border-color: #555; color: #888; }

  .hidden { display: none; }
</style>
</head>
<body>

<h1>Ultra HD Enhancer</h1>
<p class="subtitle">Pixel-Level Enhancement Engine</p>

<div id="upload-zone">
  <div id="upload-area" onclick="document.getElementById('fileInput').click()">
    <div style="font-size:2rem;margin-bottom:10px">📷</div>
    <div>Click to upload your photo</div>
    <div style="font-size:0.65rem;margin-top:6px;color:#333">JPG, PNG, WEBP</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" class="hidden">
</div>

<div id="main-workspace" class="workspace hidden">
  <div class="canvas-area">
    <div class="canvas-label">Original</div>
    <canvas id="originalCanvas"></canvas>
  </div>
  <div class="canvas-area">
    <div class="canvas-label">Enhanced</div>
    <canvas id="outputCanvas"></canvas>
    <p class="processing" id="status"></p>
  </div>
  <div class="panel">
    <div class="panel-title">Presets</div>
    <div class="preset-row">
      <div class="preset-btn active" onclick="applyPreset('ultra')" id="p-ultra">Ultra HD</div>
      <div class="preset-btn" onclick="applyPreset('portrait')" id="p-portrait">Portrait</div>
      <div class="preset-btn" onclick="applyPreset('vivid')" id="p-vivid">Vivid</div>
      <div class="preset-btn" onclick="applyPreset('matte')" id="p-matte">Matte</div>
    </div>

    <div class="divider"></div>
    <div class="panel-title">Enhance</div>

    <div class="control">
      <div class="control-row">
        <label>Brightness</label>
        <span class="val" id="vBrightness">+8</span>
      </div>
      <input type="range" id="sBrightness" min="-80" max="80" value="8" oninput="sliderUpdate('Brightness',this)">
    </div>
    <div class="control">
      <div class="control-row">
        <label>Contrast</label>
        <span class="val" id="vContrast">+22</span>
      </div>
      <input type="range" id="sContrast" min="-80" max="80" value="22" oninput="sliderUpdate('Contrast',this)">
    </div>
    <div class="control">
      <div class="control-row">
        <label>Clarity / Texture</label>
        <span class="val" id="vClarity">+30</span>
      </div>
      <input type="range" id="sClarity" min="0" max="100" value="30" oninput="sliderUpdate('Clarity',this)">
    </div>
    <div class="control">
      <div class="control-row">
        <label>Sharpness</label>
        <span class="val" id="vSharpness">+40</span>
      </div>
      <input type="range" id="sSharpness" min="0" max="100" value="40" oninput="sliderUpdate('Sharpness',this)">
    </div>
    <div class="control">
      <div class="control-row">
        <label>Skin Smooth</label>
        <span class="val" id="vSmooth">+35</span>
      </div>
      <input type="range" id="sSmooth" min="0" max="100" value="35" oninput="sliderUpdate('Smooth',this)">
    </div>
    <div class="control">
      <div class="control-row">
        <label>Saturation</label>
        <span class="val" id="vSaturation">+15</span>
      </div>
      <input type="range" id="sSaturation" min="-100" max="100" value="15" oninput="sliderUpdate('Saturation',this)">
    </div>
    <div class="control">
      <div class="control-row">
        <label>Shadows Lift</label>
        <span class="val" id="vShadows">+10</span>
      </div>
      <input type="range" id="sShadows" min="-50" max="50" value="10" oninput="sliderUpdate('Shadows',this)">
    </div>
    <div class="control">
      <div class="control-row">
        <label>Highlights</label>
        <span class="val" id="vHighlights">-8</span>
      </div>
      <input type="range" id="sHighlights" min="-50" max="50" value="-8" oninput="sliderUpdate('Highlights',this)">
    </div>
    <div class="control">
      <div class="control-row">
        <label>Vignette</label>
        <span class="val" id="vVignette">+20</span>
      </div>
      <input type="range" id="sVignette" min="0" max="100" value="20" oninput="sliderUpdate('Vignette',this)">
    </div>

    <div class="divider"></div>
    <button class="btn btn-primary" onclick="processImage()">✦ Apply Enhancement</button>
    <button class="btn btn-secondary" onclick="resetToOriginal()">Reset</button>
    <button class="btn btn-download" onclick="downloadImage()">⬇ Download HD</button>
  </div>
</div>

<script>
let originalImageData = null;
let img = new Image();

const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    img.onload = () => {
      document.getElementById('upload-zone').classList.add('hidden');
      document.getElementById('main-workspace').classList.remove('hidden');
      setupCanvases();
      processImage();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function setupCanvases() {
  const orig = document.getElementById('originalCanvas');
  const out = document.getElementById('outputCanvas');
  orig.width = img.naturalWidth;
  orig.height = img.naturalHeight;
  out.width = img.naturalWidth;
  out.height = img.naturalHeight;
  const ctx = orig.getContext('2d');
  ctx.drawImage(img, 0, 0);
  originalImageData = ctx.getImageData(0, 0, orig.width, orig.height);
}

function getSliders() {
  return {
    brightness: +document.getElementById('sBrightness').value,
    contrast: +document.getElementById('sContrast').value,
    clarity: +document.getElementById('sClarity').value,
    sharpness: +document.getElementById('sSharpness').value,
    smooth: +document.getElementById('sSmooth').value,
    saturation: +document.getElementById('sSaturation').value,
    shadows: +document.getElementById('sShadows').value,
    highlights: +document.getElementById('sHighlights').value,
    vignette: +document.getElementById('sVignette').value
  };
}

function sliderUpdate(name, el) {
  const v = el.value;
  document.getElementById('v'+name).textContent = (v > 0 ? '+' : '') + v;
  const pct = ((+v - +el.min) / (+el.max - +el.min) * 100).toFixed(1) + '%';
  el.style.setProperty('--pct', pct);
}

// Initialize track fills
window.addEventListener('load', () => {
  document.querySelectorAll('input[type=range]').forEach(el => {
    const pct = ((+el.value - +el.min) / (+el.max - +el.min) * 100).toFixed(1) + '%';
    el.style.setProperty('--pct', pct);
  });
});

// Gaussian blur kernel
function gaussianBlur(data, w, h, radius) {
  const result = new Uint8ClampedArray(data);
  const sigma = radius / 3;
  const size = Math.ceil(radius) * 2 + 1;
  const kernel = [];
  let sum = 0;
  for (let i = 0; i < size; i++) {
    const x = i - Math.ceil(radius);
    kernel[i] = Math.exp(-(x*x) / (2*sigma*sigma));
    sum += kernel[i];
  }
  for (let i = 0; i < size; i++) kernel[i] /= sum;

  const temp = new Uint8ClampedArray(data);
  // Horizontal pass
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let r=0,g=0,b=0,a=0;
      for (let k = 0; k < size; k++) {
        const px = Math.min(Math.max(x + k - Math.ceil(radius), 0), w-1);
        const idx = (y * w + px) * 4;
        r += data[idx] * kernel[k];
        g += data[idx+1] * kernel[k];
        b += data[idx+2] * kernel[k];
        a += data[idx+3] * kernel[k];
      }
      const idx = (y * w + x) * 4;
      temp[idx]=r; temp[idx+1]=g; temp[idx+2]=b; temp[idx+3]=a;
    }
  }
  // Vertical pass
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let r=0,g=0,b=0,a=0;
      for (let k = 0; k < size; k++) {
        const py = Math.min(Math.max(y + k - Math.ceil(radius), 0), h-1);
        const idx = (py * w + x) * 4;
        r += temp[idx] * kernel[k];
        g += temp[idx+1] * kernel[k];
        b += temp[idx+2] * kernel[k];
        a += temp[idx+3] * kernel[k];
      }
      const idx = (y * w + x) * 4;
      result[idx]=r; result[idx+1]=g; result[idx+2]=b; result[idx+3]=a;
    }
  }
  return result;
}

// Unsharp mask for sharpening
function unsharpMask(data, w, h, amount, radius) {
  const blurred = gaussianBlur(data, w, h, radius);
  const result = new Uint8ClampedArray(data);
  for (let i = 0; i < data.length; i += 4) {
    for (let c = 0; c < 3; c++) {
      const diff = data[i+c] - blurred[i+c];
      result[i+c] = Math.min(255, Math.max(0, data[i+c] + diff * (amount / 100)));
    }
    result[i+3] = data[i+3];
  }
  return result;
}

// Skin detection (broad warm-tone detection)
function isSkinTone(r, g, b) {
  return r > 60 && g > 30 && b > 15 &&
         r > g && r > b &&
         Math.abs(r - g) > 10 &&
         r < 250 && g < 230;
}

// Apply bilateral-like skin smoothing
function skinSmooth(data, w, h, amount) {
  if (amount <= 0) return data;
  const radius = Math.round(2 + (amount / 100) * 4);
  const blurred = gaussianBlur(data, w, h, radius);
  const result = new Uint8ClampedArray(data);
  const t = amount / 100;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2];
    if (isSkinTone(r, g, b)) {
      result[i]   = Math.round(r + (blurred[i]   - r) * t * 0.7);
      result[i+1] = Math.round(g + (blurred[i+1] - g) * t * 0.7);
      result[i+2] = Math.round(b + (blurred[i+2] - b) * t * 0.7);
    }
  }
  return result;
}

// Tone curve: shadows lift / highlight control
function applyToneCurve(val, shadows, highlights) {
  let v = val / 255;
  // Shadows: lift dark areas
  if (shadows !== 0) {
    const s = shadows / 100;
    v = v + s * (1 - v) * (1 - v) * 0.6;
  }
  // Highlights: pull back bright areas
  if (highlights !== 0) {
    const h = highlights / 100;
    v = v + h * v * v * 0.6;
  }
  return Math.min(255, Math.max(0, Math.round(v * 255)));
}

function processImage() {
  if (!originalImageData) return;
  const status = document.getElementById('status');
  status.textContent = 'Processing...';
  status.className = 'processing active';

  setTimeout(() => {
    const s = getSliders();
    const w = originalImageData.width;
    const h = originalImageData.height;

    let data = new Uint8ClampedArray(originalImageData.data);

    // Step 1: Skin smoothing (before sharpening)
    data = skinSmooth(data, w, h, s.smooth);

    // Step 2: Sharpening via unsharp mask
    if (s.sharpness > 0) {
      data = unsharpMask(data, w, h, s.sharpness * 1.8, 1.2);
    }

    // Step 3: Clarity (local contrast via wider unsharp mask)
    if (s.clarity > 0) {
      data = unsharpMask(data, w, h, s.clarity * 0.6, 4);
    }

    // Step 4: Per-pixel: brightness, contrast, saturation, tone curves
    const contrastFactor = (259 * (s.contrast + 255)) / (255 * (259 - s.contrast));

    for (let i = 0; i < data.length; i += 4) {
      let r = data[i], g = data[i+1], b = data[i+2];

      // Brightness
      r += s.brightness; g += s.brightness; b += s.brightness;

      // Contrast (pivoted at 128)
      r = contrastFactor * (r - 128) + 128;
      g = contrastFactor * (g - 128) + 128;
      b = contrastFactor * (b - 128) + 128;

      // Tone curves
      r = applyToneCurve(r, s.shadows, s.highlights);
      g = applyToneCurve(g, s.shadows, s.highlights);
      b = applyToneCurve(b, s.shadows, s.highlights);

      // Saturation via HSL
      if (s.saturation !== 0) {
        const avg = (r + g + b) / 3;
        const sat = 1 + s.saturation / 100;
        r = avg + (r - avg) * sat;
        g = avg + (g - avg) * sat;
        b = avg + (b - avg) * sat;
      }

      data[i]   = Math.min(255, Math.max(0, r));
      data[i+1] = Math.min(255, Math.max(0, g));
      data[i+2] = Math.min(255, Math.max(0, b));
    }

    // Step 5: Vignette
    if (s.vignette > 0) {
      const cx = w / 2, cy = h / 2;
      const maxDist = Math.sqrt(cx*cx + cy*cy);
      const strength = s.vignette / 100;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const dx = x - cx, dy = y - cy;
          const dist = Math.sqrt(dx*dx + dy*dy) / maxDist;
          const factor = 1 - strength * Math.pow(dist, 2) * 1.4;
          const idx = (y * w + x) * 4;
          data[idx]   = Math.max(0, data[idx]   * factor);
          data[idx+1] = Math.max(0, data[idx+1] * factor);
          data[idx+2] = Math.max(0, data[idx+2] * factor);
        }
      }
    }

    const out = document.getElementById('outputCanvas');
    const ctx = out.getContext('2d');
    const imgData = new ImageData(data, w, h);
    ctx.putImageData(imgData, 0, 0);

    status.textContent = '✦ Enhancement applied';
    status.className = 'processing';
    setTimeout(() => { status.textContent = ''; }, 2000);
  }, 30);
}

function resetToOriginal() {
  if (!originalImageData) return;
  const out = document.getElementById('outputCanvas');
  const ctx = out.getContext('2d');
  ctx.putImageData(originalImageData, 0, 0);
  document.getElementById('status').textContent = '';
}

function downloadImage() {
  const canvas = document.getElementById('outputCanvas');
  const link = document.createElement('a');
  link.download = 'ultra-hd-enhanced.jpg';
  link.href = canvas.toDataURL('image/jpeg', 1.0);
  link.click();
}

const presets = {
  ultra:    { brightness: 8,  contrast: 22, clarity: 30, sharpness: 40, smooth: 35, saturation: 15, shadows: 10, highlights: -8,  vignette: 20 },
  portrait: { brightness: 12, contrast: 18, clarity: 15, sharpness: 25, smooth: 60, saturation: 10, shadows: 15, highlights: -12, vignette: 28 },
  vivid:    { brightness: 5,  contrast: 35, clarity: 45, sharpness: 55, smooth: 20, saturation: 40, shadows: 8,  highlights: -5,  vignette: 15 },
  matte:    { brightness: 18, contrast: 10, clarity: 20, sharpness: 30, smooth: 40, saturation: -15, shadows: 25, highlights: -20, vignette: 10 }
};

function applyPreset(name) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('p-' + name).classList.add('active');
  const p = presets[name];
  const keys = ['brightness','contrast','clarity','sharpness','smooth','saturation','shadows','highlights','vignette'];
  const ids =  ['Brightness','Contrast','Clarity','Sharpness','Smooth','Saturation','Shadows','Highlights','Vignette'];
  keys.forEach((k, i) => {
    const el = document.getElementById('s' + ids[i]);
    el.value = p[k];
    const pct = ((p[k] - +el.min) / (+el.max - +el.min) * 100).toFixed(1) + '%';
    el.style.setProperty('--pct', pct);
    document.getElementById('v' + ids[i]).textContent = (p[k] > 0 ? '+' : '') + p[k];
  });
  processImage();
}

// Auto-load the uploaded image
window.addEventListener('load', () => {
  const uploadedSrc = '/mnt/user-data/uploads/copy_99042C73-5462-4D03-BEAA-D6760D7DFECB.jpeg';
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    document.getElementById('upload-zone').classList.add('hidden');
    document.getElementById('main-workspace').classList.remove('hidden');
    setupCanvases();
    processImage();
  };
  img.onerror = () => {}; // fallback to manual upload
  img.src = uploadedSrc;
});
</script>
</body>
</html>
