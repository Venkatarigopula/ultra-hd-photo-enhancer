<script>
let originalImageData = null;
let img = new Image();

const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    img.onload = () => {
      document.getElementById('upload-zone').classList.add('hidden');
      document.getElementById('main-workspace').classList.remove('hidden');
      setupCanvases();
      processImage();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function setupCanvases() {
  const orig = document.getElementById('originalCanvas');
  const out = document.getElementById('outputCanvas');
  orig.width = img.naturalWidth;
  orig.height = img.naturalHeight;
  out.width = img.naturalWidth;
  out.height = img.naturalHeight;
  const ctx = orig.getContext('2d');
  ctx.drawImage(img, 0, 0);
  originalImageData = ctx.getImageData(0, 0, orig.width, orig.height);
}

function getSliders() {
  return {
    brightness: +document.getElementById('sBrightness').value,
    contrast:   +document.getElementById('sContrast').value,
    clarity:    +document.getElementById('sClarity').value,
    sharpness:  +document.getElementById('sSharpness').value,
    smooth:     +document.getElementById('sSmooth').value,
    saturation: +document.getElementById('sSaturation').value,
    shadows:    +document.getElementById('sShadows').value,
    highlights: +document.getElementById('sHighlights').value,
    vignette:   +document.getElementById('sVignette').value
  };
}

function sliderUpdate(name, el) {
  const v = el.value;
  document.getElementById('v'+name).textContent = (v > 0 ? '+' : '') + v;
  const pct = ((+v - +el.min) / (+el.max - +el.min) * 100).toFixed(1) + '%';
  el.style.setProperty('--pct', pct);
}

window.addEventListener('load', () => {
  document.querySelectorAll('input[type=range]').forEach(el => {
    const pct = ((+el.value - +el.min) / (+el.max - +el.min) * 100).toFixed(1) + '%';
    el.style.setProperty('--pct', pct);
  });
});

function gaussianBlur(data, w, h, radius) {
  const result = new Uint8ClampedArray(data);
  const sigma = radius / 3;
  const size = Math.ceil(radius) * 2 + 1;
  const kernel = [];
  let sum = 0;
  for (let i = 0; i < size; i++) {
    const x = i - Math.ceil(radius);
    kernel[i] = Math.exp(-(x*x) / (2*sigma*sigma));
    sum += kernel[i];
  }
  for (let i = 0; i < size; i++) kernel[i] /= sum;

  const temp = new Uint8ClampedArray(data);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let r=0,g=0,b=0,a=0;
      for (let k = 0; k < size; k++) {
        const px = Math.min(Math.max(x + k - Math.ceil(radius), 0), w-1);
        const idx = (y * w + px) * 4;
        r += data[idx]*kernel[k]; g += data[idx+1]*kernel[k];
        b += data[idx+2]*kernel[k]; a += data[idx+3]*kernel[k];
      }
      const idx = (y * w + x) * 4;
      temp[idx]=r; temp[idx+1]=g; temp[idx+2]=b; temp[idx+3]=a;
    }
  }
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let r=0,g=0,b=0,a=0;
      for (let k = 0; k < size; k++) {
        const py = Math.min(Math.max(y + k - Math.ceil(radius), 0), h-1);
        const idx = (py * w + x) * 4;
        r += temp[idx]*kernel[k]; g += temp[idx+1]*kernel[k];
        b += temp[idx+2]*kernel[k]; a += temp[idx+3]*kernel[k];
      }
      const idx = (y * w + x) * 4;
      result[idx]=r; result[idx+1]=g; result[idx+2]=b; result[idx+3]=a;
    }
  }
  return result;
}

function unsharpMask(data, w, h, amount, radius) {
  const blurred = gaussianBlur(data, w, h, radius);
  const result = new Uint8ClampedArray(data);
  for (let i = 0; i < data.length; i += 4) {
    for (let c = 0; c < 3; c++) {
      const diff = data[i+c] - blurred[i+c];
      result[i+c] = Math.min(255, Math.max(0, data[i+c] + diff * (amount / 100)));
    }
    result[i+3] = data[i+3];
  }
  return result;
}

function isSkinTone(r, g, b) {
  return r > 60 && g > 30 && b > 15 &&
         r > g && r > b &&
         Math.abs(r - g) > 10 &&
         r < 250 && g < 230;
}

function skinSmooth(data, w, h, amount) {
  if (amount <= 0) return data;
  const radius = Math.round(2 + (amount / 100) * 4);
  const blurred = gaussianBlur(data, w, h, radius);
  const result = new Uint8ClampedArray(data);
  const t = amount / 100;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2];
    if (isSkinTone(r, g, b)) {
      result[i]   = Math.round(r + (blurred[i]   - r) * t * 0.7);
      result[i+1] = Math.round(g + (blurred[i+1] - g) * t * 0.7);
      result[i+2] = Math.round(b + (blurred[i+2] - b) * t * 0.7);
    }
  }
  return result;
}

function applyToneCurve(val, shadows, highlights) {
  let v = val / 255;
  if (shadows !== 0) { const s = shadows/100; v = v + s*(1-v)*(1-v)*0.6; }
  if (highlights !== 0) { const h = highlights/100; v = v + h*v*v*0.6; }
  return Math.min(255, Math.max(0, Math.round(v * 255)));
}

function processImage() {
  if (!originalImageData) return;
  const status = document.getElementById('status');
  status.textContent = 'Processing...';
  status.className = 'processing active';

  setTimeout(() => {
    const s = getSliders();
    const w = originalImageData.width;
    const h = originalImageData.height;
    let data = new Uint8ClampedArray(originalImageData.data);

    data = skinSmooth(data, w, h, s.smooth);
    if (s.sharpness > 0) data = unsharpMask(data, w, h, s.sharpness * 1.8, 1.2);
    if (s.clarity > 0)   data = unsharpMask(data, w, h, s.clarity * 0.6, 4);

    const contrastFactor = (259 * (s.contrast + 255)) / (255 * (259 - s.contrast));

    for (let i = 0; i < data.length; i += 4) {
      let r = data[i], g = data[i+1], b = data[i+2];
      r += s.brightness; g += s.brightness; b += s.brightness;
      r = contrastFactor*(r-128)+128;
      g = contrastFactor*(g-128)+128;
      b = contrastFactor*(b-128)+128;
      r = applyToneCurve(r, s.shadows, s.highlights);
      g = applyToneCurve(g, s.shadows, s.highlights);
      b = applyToneCurve(b, s.shadows, s.highlights);
      if (s.saturation !== 0) {
        const avg = (r+g+b)/3, sat = 1 + s.saturation/100;
        r = avg+(r-avg)*sat; g = avg+(g-avg)*sat; b = avg+(b-avg)*sat;
      }
      data[i]  =Math.min(255,Math.max(0,r));
      data[i+1]=Math.min(255,Math.max(0,g));
      data[i+2]=Math.min(255,Math.max(0,b));
    }

    if (s.vignette > 0) {
      const cx=w/2, cy=h/2, maxDist=Math.sqrt(cx*cx+cy*cy), strength=s.vignette/100;
      for (let y=0; y<h; y++) {
        for (let x=0; x<w; x++) {
          const dx=x-cx, dy=y-cy;
          const dist=Math.sqrt(dx*dx+dy*dy)/maxDist;
          const factor=1-strength*Math.pow(dist,2)*1.4;
          const idx=(y*w+x)*4;
          data[idx]  =Math.max(0,data[idx]  *factor);
          data[idx+1]=Math.max(0,data[idx+1]*factor);
          data[idx+2]=Math.max(0,data[idx+2]*factor);
        }
      }
    }

    const out = document.getElementById('outputCanvas');
    const ctx = out.getContext('2d');
    ctx.putImageData(new ImageData(data, w, h), 0, 0);
    status.textContent = '✦ Enhancement applied';
    status.className = 'processing';
    setTimeout(() => { status.textContent = ''; }, 2000);
  }, 30);
}

function resetToOriginal() {
  if (!originalImageData) return;
  const out = document.getElementById('outputCanvas');
  out.getContext('2d').putImageData(originalImageData, 0, 0);
  document.getElementById('status').textContent = '';
}

function downloadImage() {
  const canvas = document.getElementById('outputCanvas');
  if (!canvas.width || !canvas.height) {
    alert('Please upload and enhance a photo first!');
    return;
  }
  const status = document.getElementById('status');
  status.textContent = 'Preparing download...';
  status.className = 'processing active';

  // Pull raw pixel data and rebuild on a fresh canvas to avoid tainted canvas
  try {
    const ctx = canvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const fresh = document.createElement('canvas');
    fresh.width = canvas.width;
    fresh.height = canvas.height;
    fresh.getContext('2d').putImageData(imageData, 0, 0);

    fresh.toBlob(blob => {
      if (!blob) { fallbackOpen(canvas, status); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ultra-hd-enhanced.jpg';
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
      status.textContent = '✦ Saved!';
      status.className = 'processing';
      setTimeout(() => { status.textContent = ''; }, 2500);
    }, 'image/jpeg', 0.98);

  } catch(e) {
    fallbackOpen(canvas, status);
  }
}

const presets = {
ultra:    { brightness:8,  contrast:22, clarity:30, sharpness:40, smooth:35, saturation:15,  shadows:10, highlights:-8,  vignette:20 },
portrait: { brightness:12, contrast:18, clarity:15, sharpness:25, smooth:60, saturation:10,  shadows:15, highlights:-12, vignette:28 },
vivid:    { brightness:5,  contrast:35, clarity:45, sharpness:55, smooth:20, saturation:40,  shadows:8,  highlights:-5,  vignette:15 },
matte:    { brightness:18, contrast:10, clarity:20, sharpness:30, smooth:40, saturation:-15, shadows:25, highlights:-20, vignette:10 }
};

function applyPreset(name) {
document.querySelectorAll(’.preset-btn’).forEach(b => b.classList.remove(‘active’));
document.getElementById(‘p-’+name).classList.add(‘active’);
const p = presets[name];
const keys = [‘brightness’,‘contrast’,‘clarity’,‘sharpness’,‘smooth’,‘saturation’,‘shadows’,‘highlights’,‘vignette’];
const ids  = [‘Brightness’,‘Contrast’,‘Clarity’,‘Sharpness’,‘Smooth’,‘Saturation’,‘Shadows’,‘Highlights’,‘Vignette’];
keys.forEach((k,i) => {
const el = document.getElementById(‘s’+ids[i]);
el.value = p[k];
el.style.setProperty(’–pct’, ((p[k] - +el.min) / (+el.max - +el.min)*100).toFixed(1)+’%’);
document.getElementById(‘v’+ids[i]).textContent = (p[k]>0?’+’:’’)+p[k];
});
processImage();
}
</script>
